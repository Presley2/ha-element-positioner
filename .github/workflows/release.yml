name: Release

on:
  release:
    types: [published]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drag_editor.js
            drag_editor_panel.js
