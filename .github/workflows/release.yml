name: Release

on:
  release:
    types: [published]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload drag_editor.js
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drag_editor.js
            drag_editor_panel.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
